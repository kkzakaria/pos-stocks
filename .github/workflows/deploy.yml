# Déploiement des deux Workers Cloudflare.
# S'ignore proprement tant que les apps n'existent pas (Phase 1 non terminée).
# Prérequis côté GitHub (Settings → Secrets and variables → Actions) :
#   - secrets : CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   - variable : VITE_API_URL (URL publique de l'API, pour le build de la SPA)
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier que les apps existent
        id: check
        run: |
          if [ -f apps/api/wrangler.jsonc ] && [ -f apps/web/wrangler.jsonc ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Apps absentes — déploiement ignoré (Phase 1 non terminée)."
          fi

      - name: Vérifier le secret CLOUDFLARE_API_TOKEN
        if: steps.check.outputs.ready == 'true'
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::Secret CLOUDFLARE_API_TOKEN manquant — créez un token API Cloudflare (modèle « Edit Cloudflare Workers » + droits D1) puis : gh secret set CLOUDFLARE_API_TOKEN"
            exit 1
          fi

      - if: steps.check.outputs.ready == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Installer les dépendances
        if: steps.check.outputs.ready == 'true'
        run: bun install --frozen-lockfile

      # wrangler est invoqué via bun (bunx) et non via cloudflare/wrangler-action :
      # l'action utilise npm en interne, qui ne comprend pas le protocole workspace:* du monorepo bun.
      - name: Appliquer les migrations D1
        if: steps.check.outputs.ready == 'true'
        run: bun run --cwd apps/api db:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Déployer l'API
        if: steps.check.outputs.ready == 'true'
        run: bunx wrangler deploy
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Construire la SPA
        if: steps.check.outputs.ready == 'true'
        run: bun run --cwd apps/web build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Déployer la SPA
        if: steps.check.outputs.ready == 'true'
        run: bunx wrangler deploy
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
